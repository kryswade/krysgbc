<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Game Boy Color HTML - Homebrew embedded</title>
<style>
  :root {
    --body:#a7aab2;
    --body-dark:#757984;
    --body-light:#d5d7de;
    --screen-frame:#222733;
    --lcd:#9bac0f;
    --lcd-dark:#26320d;
    --purple:#5d4aa2;
    --purple2:#3e2b79;
    --red:#b72146;
    --text:#1f2937;
    --shadow:#0008;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  html,body { margin:0; min-height:100%; background:
    radial-gradient(circle at 50% 0%, #eef2ff 0 8%, transparent 32%),
    linear-gradient(145deg,#111827,#25304a 48%,#0b1020); font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; color:var(--text); }
  body { display:flex; justify-content:center; align-items:flex-start; padding:12px; }

  .gbc {
    width:min(430px, 100%);
    min-height:calc(100svh - 24px);
    background:linear-gradient(145deg,var(--body-light),var(--body) 40%,var(--body-dark));
    border-radius:28px 28px 72px 28px;
    padding:18px 16px 22px;
    box-shadow:0 24px 70px var(--shadow), inset 0 2px 4px #fff8, inset 0 -8px 18px #0002;
    border:1px solid #ffffff70;
    position:relative;
    overflow:hidden;
  }
  .gbc::before {
    content:""; position:absolute; inset:10px 12px auto 12px; height:6px; border-radius:99px;
    background:linear-gradient(90deg,#fff8,#0002,#fff5); opacity:.7;
  }
  .brand { display:flex; justify-content:space-between; align-items:center; margin:6px 6px 12px; gap:10px; }
  .brand h1 { margin:0; line-height:1; font-size:19px; letter-spacing:-.4px; color:#273043; text-shadow:0 1px #fff8; }
  .brand .tag { font-weight:800; color:#566070; font-size:11px; letter-spacing:.12em; text-transform:uppercase; }

  .screenBezel {
    background:linear-gradient(145deg,#10141f,#343b4c);
    border-radius:18px 18px 44px 18px;
    padding:16px 14px 34px;
    box-shadow:inset 0 3px 8px #000b, 0 2px 4px #fff6;
    border:2px solid #1c2230;
    position:relative;
  }
  .screenTop { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; color:#cbd5e1; font-size:10px; letter-spacing:.09em; }
  .led { display:inline-flex; align-items:center; gap:5px; }
  .dot { width:8px; height:8px; border-radius:50%; background:#ef4444; box-shadow:0 0 10px #ef4444; }
  .screen {
    width:100%; aspect-ratio:10/9; background:var(--lcd); border-radius:8px;
    overflow:hidden; border:4px solid #0f172a; position:relative;
    box-shadow:inset 0 0 28px #0007, 0 0 0 2px #ffffff18;
  }
  #game { width:100%; height:100%; }
  .scanlines { pointer-events:none; position:absolute; inset:0; background:repeating-linear-gradient(0deg, #00000018 0 1px, transparent 1px 4px); mix-blend-mode:multiply; opacity:.45; }
  .screenLabel { position:absolute; bottom:10px; left:22px; right:22px; display:flex; align-items:center; gap:8px; justify-content:center; color:#cbd5e1; font-style:italic; font-size:12px; }
  .screenLabel::before,.screenLabel::after { content:""; height:2px; flex:1; background:linear-gradient(90deg,transparent,#a78bfa,#7dd3fc,transparent); opacity:.8; }

  .controls { margin-top:22px; display:grid; grid-template-columns:1fr 1fr; gap:16px; align-items:center; }
  .dpad { width:138px; height:138px; position:relative; justify-self:start; margin-left:8px; }
  .key {
    position:absolute; border:0; cursor:pointer; touch-action:none; color:#111827; font-weight:900;
    background:linear-gradient(145deg,#2f3544,#101520); box-shadow:0 6px 0 #050812, 0 13px 18px #0006, inset 0 1px 3px #fff4;
  }
  .dpad .key { width:46px; height:46px; color:#e5e7eb; }
  .up { left:46px; top:0; border-radius:10px 10px 4px 4px; }
  .down { left:46px; bottom:0; border-radius:4px 4px 10px 10px; }
  .left { left:0; top:46px; border-radius:10px 4px 4px 10px; }
  .right { right:0; top:46px; border-radius:4px 10px 10px 4px; }
  .center { left:46px; top:46px; cursor:default; border-radius:4px; }
  .key:active,.key.isDown { transform:translateY(5px); box-shadow:0 1px 0 #050812, 0 5px 10px #0007, inset 0 1px 3px #fff2; }

  .ab { height:126px; position:relative; justify-self:end; width:164px; transform:rotate(-18deg); }
  .round { width:62px; height:62px; border-radius:50%; background:linear-gradient(145deg,#e54872,var(--red)); color:#fff; font-size:20px; letter-spacing:.05em; box-shadow:0 7px 0 #741127, 0 13px 19px #0006, inset 0 2px 5px #fff5; }
  .btnB { left:10px; top:46px; }
  .btnA { right:10px; top:18px; }
  .round span { display:block; transform:rotate(18deg); }

  .menuRow { margin-top:18px; display:flex; gap:18px; justify-content:center; align-items:center; }
  .pill {
    width:72px; height:24px; border-radius:999px; transform:rotate(-18deg); background:linear-gradient(145deg,#6b7280,#303746); color:#f8fafc;
    font-size:10px; letter-spacing:.08em; box-shadow:0 4px 0 #161b25, 0 9px 12px #0005, inset 0 1px 2px #fff4;
  }


  /* FIX START/SELECT: non devono ereditare position:absolute da .key */
  .menuRow .key,
  .menuRow .pill {
    position: relative !important;
    left: auto !important;
    right: auto !important;
    top: auto !important;
    bottom: auto !important;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .speaker { margin:16px 18px 0 auto; width:118px; height:68px; display:grid; grid-template-columns:repeat(6,1fr); gap:6px; transform:rotate(-18deg); opacity:.75; }
  .speaker i { display:block; width:5px; height:44px; border-radius:99px; background:#4b5563; box-shadow:inset 0 1px 1px #0006; }
  .speaker i:nth-child(odd) { margin-top:12px; }

  .utility { margin-top:12px; display:grid; gap:8px; }
  .utility .row { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
  .utilBtn, .fileBtn { border:1px solid #ffffff80; background:#ffffff8a; color:#243244; border-radius:14px; padding:9px 11px; font-weight:800; font-size:12px; box-shadow:0 3px 8px #0002; cursor:pointer; }
  .utilBtn:active, .fileBtn:active { transform:translateY(2px); }
  input[type=file] { display:none; }
  .note { font-size:11px; line-height:1.35; color:#374151; text-align:center; padding:0 10px; }
  .status { font-size:11px; text-align:center; color:#111827; font-weight:700; min-height:16px; }


  /* Overlay EmulatorJS: nascondo SOLO i bottoni/etichette marcati via JS.
     Non nasconde canvas né wrapper video. */
  #game .copilot-hide-ejs-button-only {
    opacity: 0 !important;
    visibility: hidden !important;
    pointer-events: none !important;
  }



  /* FINAL PATCH: nasconde solo overlay D-pad/menu/bottoni, mai il canvas */
  #game .copilot-hide-ejs-button-only,
  #game .copilot-hide-ejs-menu-only,
  #game .copilot-hide-ejs-dpad-only { opacity:0!important; pointer-events:none!important; }
  #game canvas { opacity:1!important; visibility:visible!important; display:block!important; image-rendering:pixelated; }



  /* START/SELECT touch area leggermente più ampia */
  .menuRow .pill {
    min-width: 86px !important;
    height: 32px !important;
    z-index: 20;
  }



  /* Menu salvataggi a comparsa: mantiene pulita l'interfaccia principale */
  .saveMenuLauncherRow { margin-top: 2px; }
  .saveMainBtn { min-width: 160px; }
  .saveModalBackdrop {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: rgba(2, 6, 23, .62);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 18px;
    backdrop-filter: blur(4px);
  }
  .saveModalBackdrop[hidden] { display: none !important; }
  .saveModal {
    width: min(360px, 92vw);
    border-radius: 22px;
    padding: 14px;
    background: linear-gradient(145deg, #eef2f7, #aeb4c0 55%, #737b8a);
    box-shadow: 0 24px 70px #0009, inset 0 2px 3px #fff9, inset 0 -5px 12px #0002;
    border: 1px solid #ffffffaa;
    color: #172033;
  }
  .saveModalHeader {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
    padding: 8px 10px;
    border-radius: 16px;
    color: #e5e7eb;
    background: linear-gradient(145deg, #101520, #303746);
    box-shadow: inset 0 1px 2px #fff2;
    font-weight: 900;
    letter-spacing: .08em;
  }
  .saveModalClose {
    border: 0;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    color: #fff;
    background: linear-gradient(145deg, #e54872, #b72146);
    font-size: 24px;
    font-weight: 900;
    line-height: 1;
    cursor: pointer;
    box-shadow: 0 4px 0 #741127, 0 8px 12px #0005;
  }
  .saveModalGrid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 9px;
  }
  .saveActionBtn {
    border: 1px solid #ffffffb5;
    border-radius: 16px;
    padding: 12px 13px;
    background: #ffffffcf;
    color: #243244;
    font-size: 15px;
    font-weight: 900;
    text-align: left;
    cursor: pointer;
    box-shadow: 0 4px 10px #0002, inset 0 1px 2px #fff;
  }
  .saveActionBtn:active, .saveModalClose:active { transform: translateY(2px); }
  .fileSaveAction { display: block; }
  .closeWide {
    display: block;
    width: 100%;
    text-align: center;
    margin-top: 10px;
    background: linear-gradient(145deg, #6b7280, #303746);
    color: #fff;
  }



  /* Boot logo stile Game Boy Color quando parte/carica una ROM */
  .gbBootLogo {
    position: absolute;
    inset: 0;
    z-index: 45;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #edf2f7 0%, #f8fafc 42%, #cbd5e1 100%);
    color: #111827;
    pointer-events: none;
    opacity: 0;
    transform: scale(1.01);
    transition: opacity .35s ease, transform .55s ease;
  }
  .gbBootLogo.show {
    opacity: 1;
    transform: scale(1);
  }
  .gbBootLogoInner {
    text-align: center;
    filter: drop-shadow(0 2px 0 #fff8);
  }
  .gbBootNintendo {
    display: inline-block;
    border: 2px solid #111827;
    border-radius: 999px;
    padding: 3px 12px 4px;
    font-size: 13px;
    font-weight: 900;
    letter-spacing: .03em;
    margin-bottom: 8px;
  }
  .gbBootGameBoy {
    font-size: clamp(28px, 8vw, 46px);
    line-height: .92;
    font-weight: 950;
    letter-spacing: -.06em;
    font-style: italic;
  }
  .gbBootColor {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-top: 5px;
    font-size: clamp(16px, 4.5vw, 26px);
    font-weight: 950;
    letter-spacing: .02em;
  }
  .gbBootColor span:nth-child(1) { color:#ef4444; }
  .gbBootColor span:nth-child(2) { color:#f97316; }
  .gbBootColor span:nth-child(3) { color:#22c55e; }
  .gbBootColor span:nth-child(4) { color:#3b82f6; }
  .gbBootColor span:nth-child(5) { color:#a855f7; }
  .signature{
    margin-top: 10px;
    text-align:center;
    font-size:13px;
    line-height:1.4;
    color:#374151;
    opacity:.96;
    font-style:italic;
  }
  .signature strong{
    color:#5d4aa2;
    font-weight:900;
  }



  /* Avvio compatibile mobile: alcuni browser richiedono un gesto utente prima di avviare WASM/audio */
  .gbTapStart {
    position: absolute;
    inset: 0;
    z-index: 48;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    background: linear-gradient(135deg, rgba(198,209,111,.94), rgba(155,172,15,.96));
    color: #1f2a0a;
    text-align: center;
    cursor: pointer;
    transition: opacity .25s ease, visibility .25s ease;
  }
  .gbTapStart.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  .gbTapStartBox {
    border: 3px solid #26320d;
    border-radius: 10px;
    padding: 13px 14px;
    background: rgba(255,255,255,.26);
    box-shadow: inset 0 1px 0 #fff8, 0 4px 12px #0002;
  }
  .gbTapStartTitle {
    font-weight: 950;
    letter-spacing: .08em;
    font-size: 16px;
  }
  .gbTapStartText {
    margin-top: 5px;
    font-size: 12px;
    font-weight: 800;
  }



  /* Boot GBC animato realistico simulato: non usa il BIOS proprietario, ma replica timing/stile visivo. */
  .gbBootLogo.gbcBootReal {
    position: absolute;
    inset: 0;
    z-index: 47;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background:
      radial-gradient(circle at 50% 18%, rgba(255,255,255,.32), transparent 38%),
      linear-gradient(135deg, #d7e38a 0%, #b7c84c 35%, #94a513 100%);
    color: #172204;
    pointer-events: none;
    opacity: 0;
    transform: scale(1.01);
    transition: opacity .22s ease, transform .28s ease;
    overflow: hidden;
    image-rendering: pixelated;
  }
  .gbBootLogo.gbcBootReal.show {
    opacity: 1;
    transform: scale(1);
  }
  .gbcBootPixels {
    position: absolute;
    inset: 0;
    opacity: .22;
    background:
      repeating-linear-gradient(0deg, rgba(0,0,0,.08) 0 1px, transparent 1px 4px),
      repeating-linear-gradient(90deg, rgba(255,255,255,.07) 0 1px, transparent 1px 5px);
    mix-blend-mode: multiply;
  }
  .gbcBootNintendo {
    position: relative;
    z-index: 2;
    border: 2px solid #172204;
    border-radius: 999px;
    padding: 3px 14px 4px;
    font-weight: 950;
    font-size: clamp(12px, 3vw, 18px);
    letter-spacing: .03em;
    background: rgba(255,255,255,.12);
    transform: translateY(-120px);
    filter: blur(.2px);
    opacity: 0;
  }
  .gbBootLogo.show .gbcBootNintendo {
    animation: gbcNintendoDrop 1.05s cubic-bezier(.18,.89,.28,1.18) .12s forwards;
  }
  .gbcBootMain {
    position: relative;
    z-index: 2;
    display: flex;
    gap: clamp(6px, 2vw, 11px);
    align-items: baseline;
    font-weight: 1000;
    font-style: italic;
    font-size: clamp(28px, 8.5vw, 50px);
    line-height: .88;
    letter-spacing: -.075em;
    transform: translateY(18px);
    opacity: 0;
    text-shadow: 2px 2px 0 rgba(255,255,255,.26), -1px -1px 0 rgba(0,0,0,.15);
  }
  .gbBootLogo.show .gbcBootMain {
    animation: gbcMainReveal .55s ease-out 1.05s forwards;
  }
  .gbcBootColor {
    position: relative;
    z-index: 2;
    display: flex;
    gap: clamp(5px, 1.8vw, 9px);
    font-weight: 1000;
    font-size: clamp(17px, 4.6vw, 28px);
    letter-spacing: .02em;
    opacity: 0;
    transform: translateY(10px);
  }
  .gbBootLogo.show .gbcBootColor {
    animation: gbcColorReveal .5s ease-out 1.28s forwards;
  }
  .gbcBootColor span:nth-child(1) { color:#ef4444; }
  .gbcBootColor span:nth-child(2) { color:#f97316; }
  .gbcBootColor span:nth-child(3) { color:#22c55e; }
  .gbcBootColor span:nth-child(4) { color:#3b82f6; }
  .gbcBootColor span:nth-child(5) { color:#a855f7; }
  .gbcBootStatus {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 10px;
    z-index: 2;
    font-size: 10px;
    letter-spacing: .22em;
    font-weight: 900;
    text-align: center;
    opacity: 0;
  }
  .gbBootLogo.show .gbcBootStatus {
    animation: gbcStatusBlink .7s steps(2,end) 1.55s 2 forwards;
  }
  @keyframes gbcNintendoDrop {
    0% { transform: translateY(-130px); opacity: 0; }
    18% { opacity: 1; }
    76% { transform: translateY(0); }
    88% { transform: translateY(-4px); }
    100% { transform: translateY(0); opacity: 1; }
  }
  @keyframes gbcMainReveal {
    from { transform: translateY(18px) scale(.96); opacity: 0; }
    to { transform: translateY(0) scale(1); opacity: 1; }
  }
  @keyframes gbcColorReveal {
    from { transform: translateY(10px); opacity: 0; filter: saturate(.6); }
    to { transform: translateY(0); opacity: 1; filter: saturate(1.15); }
  }
  @keyframes gbcStatusBlink {
    0%, 45% { opacity: 0; }
    50%, 100% { opacity: .78; }
  }

  @media (max-height:740px) { .gbc { padding-bottom:12px; } .screen { aspect-ratio:10/8.2; } .controls { margin-top:14px; } .speaker { display:none; } }
</style>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="GBC">
<link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
  <main class="gbc" aria-label="Emulatore Game Boy Color HTML">
    <div class="brand">
      <h1>GAME BOY <span style="color:#5d4aa2">Color</span></h1>
      <div class="tag">HTML Emulator</div>
    </div>

    <section class="screenBezel">
      <div class="screenTop"><span class="led"><span class="dot"></span> POWER</span><span>DOT MATRIX WITH STEREO SOUND</span></div>
      <div class="screen">
        <div id="game"></div>
        <div class="gbTapStart" id="gbTapStart" aria-hidden="false">
          <div class="gbTapStartBox">
            <div class="gbTapStartTitle">TOCCA PER AVVIARE</div>
            <div class="gbTapStartText">La ROM embedded partirà dopo il primo tap.</div>
          </div>
        </div>
        
        <div class="gbBootLogo gbcBootReal" id="gbBootLogo" aria-hidden="true">
          <div class="gbcBootPixels" aria-hidden="true"></div>
          <div class="gbcBootNintendo" id="gbcBootNintendo">Nintendo</div>
          <div class="gbcBootMain">
            <span class="gbcBootGame">GAME</span>
            <span class="gbcBootBoy">BOY</span>
          </div>
          <div class="gbcBootColor" aria-label="COLOR">
            <span>C</span><span>O</span><span>L</span><span>O</span><span>R</span>
          </div>
          <div class="gbcBootStatus" id="gbcBootStatus">KRYSGBC</div>
        </div>
        <div class="scanlines"></div>
      </div>
      <div class="screenLabel">GAME BOY COLOR</div>
    </section>

    <section class="controls" aria-label="Comandi touch">
      <div class="dpad">
        <button class="key up" data-key="ArrowUp">▲</button>
        <button class="key left" data-key="ArrowLeft">◀</button>
        <button class="key center" tabindex="-1"></button>
        <button class="key right" data-key="ArrowRight">▶</button>
        <button class="key down" data-key="ArrowDown">▼</button>
      </div>
      <div class="ab">
        <button class="key round btnB" data-key="x"><span>B</span></button>
        <button class="key round btnA" data-key="z"><span>A</span></button>
      </div>
    </section>

    <section class="menuRow">
      <button class="key pill" data-key="Shift"><span>SELECT</span></button>
      <button class="key pill" data-key="Enter"><span>START</span></button>
    </section>

    <div class="speaker" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i></div>

    <section class="utility">
      <div class="row">
        <button class="utilBtn" id="audioBtn">🔊 Attiva audio</button>
        <button class="utilBtn" id="reloadEmbedded">Ricarica ROM</button>
        <label class="fileBtn">Carica ROM<input id="romFile" type="file" accept=".gb,.gbc,.zip,application/zip" /></label>
      </div>

      <div class="row saveMenuLauncherRow">
        <button class="utilBtn saveMainBtn" id="openSaveMenuBtn">💾 Salvataggi</button>
      </div>
      <div class="status" id="status">Homebrew embedded caricata.</div>
      <div class="note signature">
        <span>Un progetto di <strong>kryswade</strong>.</span><br>
        <span>Cosa aspetti a provarlo, John?</span>
      </div>
    </section>

    <div class="saveModalBackdrop" id="saveModalBackdrop" hidden>
      <div class="saveModal" role="dialog" aria-modal="true" aria-labelledby="saveModalTitle">
        <div class="saveModalHeader">
          <div id="saveModalTitle">SALVATAGGI</div>
          <button class="saveModalClose" id="closeSaveMenuBtn" aria-label="Chiudi menu salvataggi">×</button>
        </div>
        <div class="saveModalGrid">
          <button class="saveActionBtn" id="saveStateBtn">💾 Salva stato</button>
          <button class="saveActionBtn" id="loadStateBtn">↩️ Carica stato</button>
          <button class="saveActionBtn" id="saveRamBtn">💾 Salva gioco interno</button>
          <button class="saveActionBtn" id="loadRamBtn">📂 Carica gioco interno</button>
          <button class="saveActionBtn" id="exportRamBtn">⬇️ Esporta .sav</button>
          <label class="saveActionBtn fileSaveAction">⬆️ Importa .sav<input id="importRamFile" type="file" accept=".sav,.srm,.ram,.rtc,application/octet-stream" /></label>
        </div>
        <button class="saveActionBtn closeWide" id="closeSaveMenuBtn2">Chiudi</button>
      </div>
    </div>
  </main>

<script>
const EMBEDDED_ROM_BASE64 = null; /* ROM esterna: game.gbc */
const EMBEDDED_ROM_NAME = "kryswade_homebrew.gbc";
let injectedLoader = false;
let activeBlobUrl = null;

function b64ToBlobUrl(b64, mime = "application/octet-stream") {
  const binary = atob(b64.replace(/\s+/g, ""));
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const blob = new Blob([bytes], { type: mime });
  if (activeBlobUrl) URL.revokeObjectURL(activeBlobUrl);
  activeBlobUrl = URL.createObjectURL(blob);
  return activeBlobUrl;
}

function findStartSelectOverlayFinal(key) {

  const label = key === 'Enter' ? 'start' : 'select';
  const list = Array.from(root.querySelectorAll('button,div,span,p,a')).filter(el => {
    if (el.closest('.controls,.menuRow,.utility')) return false;
    if (el.tagName === 'CANVAS' || (el.querySelector && el.querySelector('canvas'))) return false;

    function iosSafeBlobCleanup() {

    function armCleanupOnce() {
      if (cleanupArmed) return;

      setTimeout(iosSafeBlobCleanup, 8000);

      document.addEventListener(evt, armCleanupOnce, { once: true, passive: true });

        try { if (window.gc) window.gc(); } catch (e) {}

<script>
/* IOS SINGLE THREAD + MEM GROWTH PATCH */
(function () {
  try {
    var IS_IOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    if (!IS_IOS) return;

    // ROOT CAUSE (documentato su WebKit Bugzilla #314551 e Emscripten #19374):
    // su iOS Safari le pagine WASM MULTI-THREAD (SharedArrayBuffer / pthread) vengono
    // terminate e ricaricate in modo aggressivo; la memoria condivisa non viene liberata
    // ai reload -> OOM a catena. La stessa build SINGLE-THREAD gira senza reload.
    // Inoltre disabilitare la crescita memoria PEGGIORA l'OOM: la mitigazione corretta e'
    // crescita ABILITATA con un tetto massimo, NON memoria fissa.

    if (window.EJS_threads !== false) window.EJS_threads = false;
    if (typeof window.EJS_disableRewind === 'undefined') window.EJS_disableRewind = true;

    window.Module = window.Module || {};
    window.Module.ALLOW_MEMORY_GROWTH = 1;                 // crescita attiva
    if (typeof window.Module.MAXIMUM_MEMORY === 'undefined')
      window.Module.MAXIMUM_MEMORY = 256 * 1024 * 1024;    // tetto ragionevole
    // NON fissare INITIAL_MEMORY: lascia partire da un default piccolo e crescere.
    try {
      if (typeof window.Module.INITIAL_MEMORY !== 'undefined') delete window.Module.INITIAL_MEMORY;
      if (typeof window.Module.TOTAL_MEMORY !== 'undefined') delete window.Module.TOTAL_MEMORY;
    } catch (e2) {}
  } catch (e) {
    console.warn('iOS single-thread + mem-growth patch skipped:', e);
  }
})();

<script>
/* IOS AUTO RESUME + PWA INSTALL PATCH
   PART A: snapshot automatico invisibile in una regione IndexedDB DEDICATA
           ('GBC_AUTO_RESUME_DB'), separata dai save state manuali del codice.
           Cosi il reload forzato di Safari appare solo come un flash: l'emulazione riprende.
   PART B: pulsante iOS-only per installare l'HTML come PWA (istruzioni "Aggiungi a Home",
           perche iOS Safari non supporta l'install programmatico beforeinstallprompt). */
(function () {
  try {
    var IS_IOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    if (!IS_IOS) return;

    /* ===== PART A: AUTO RESUME (regione storage separata) ===== */
    var RESUME_DB = 'GBC_AUTO_RESUME_DB';
    var RESUME_STORE = 'resume';

    function openResumeDB() {
      return new Promise(function (resolve, reject) {
        try {
          var req = indexedDB.open(RESUME_DB, 1);
          req.onupgradeneeded = function (e) {
            var db = e.target.result;
            if (!db.objectStoreNames.contains(RESUME_STORE)) {
              db.createObjectStore(RESUME_STORE, { keyPath: 'id' });
            }
          };
          req.onsuccess = function () { resolve(req.result); };
          req.onerror = function () { reject(req.error); };
        } catch (err) { reject(err); }
      });
    }
    function idbPut(key, data) {
      return openResumeDB().then(function (db) {
        return new Promise(function (resolve, reject) {
          var tx = db.transaction(RESUME_STORE, 'readwrite');
          tx.objectStore(RESUME_STORE).put({ id: key, data: data, t: Date.now() });
          tx.oncomplete = function () { resolve(true); };
          tx.onerror = function () { reject(tx.error); };
        });
      });
    }
    function idbGet(key) {
      return openResumeDB().then(function (db) {
        return new Promise(function (resolve, reject) {
          var tx = db.transaction(RESUME_STORE, 'readonly');
          var r = tx.objectStore(RESUME_STORE).get(key);
          r.onsuccess = function () { resolve(r.result || null); };
          r.onerror = function () { reject(r.error); };
        });
      });
    }
    function coreReady() {
      return !!(window.EJS_emulator && window.EJS_emulator.gameManager &&
                window.EJS_emulator.gameManager.getState);
    }
    var __snapBusy = false;
    function toU8Copy(st) {
      try {
        if (!st) return null;
        if (st instanceof Uint8Array) return new Uint8Array(st);
        if (st instanceof ArrayBuffer) return new Uint8Array(st.slice(0));
        if (st.buffer instanceof ArrayBuffer) return new Uint8Array(st.buffer.slice(0));
        if (Array.isArray(st)) return Uint8Array.from(st);
        return null;
      } catch (e) { return null; }

    function snapshotNow() {
      if (!coreReady() || __snapBusy) return;
      __snapBusy = true;

        Promise.resolve(window.EJS_emulator.gameManager.getState()).then(function (st) {
          var u8 = toU8Copy(st);

            idbPut('auto', u8).catch(function () {});
            idbPut('meta', String(window.EJS_gameName || 'game')).catch(function () {});
          }

      } catch (e) { __snapBusy = false; }
    }
    var __resumeRestored = false;
    function reviveU8(data) {
      try {
        if (!data) return null;
        if (data instanceof Uint8Array) return new Uint8Array(data);
        if (data instanceof ArrayBuffer) return new Uint8Array(data.slice(0));
        if (data.buffer instanceof ArrayBuffer) return new Uint8Array(data.buffer.slice(0));
        if (data.data && (data.data instanceof ArrayBuffer || ArrayBuffer.isView(data.data))) return reviveU8(data.data);
        if (Array.isArray(data)) return Uint8Array.from(data);
        return null;
      } catch (e) { return null; }
    }
    function tryResume() {
      try {
        var em = window.EJS_emulator;
        if (em) {

          if (em.gameManager && typeof em.gameManager.resume === 'function') { try { em.gameManager.resume(); } catch(e){} }
          if (typeof em.paused !== 'undefined') { try { em.paused = false; } catch(e){} }

      if (!coreReady() || __resumeRestored) return;
      idbGet('auto').then(function (rec) {

        if (!u8 || u8.length === 0) { __resumeRestored = true; return; }
        try {
          var p = window.EJS_emulator.gameManager.loadState(u8);

            p.then(function () { __resumeRestored = true; tryResume(); })
             .catch(function () { __resumeRestored = true; tryResume(); });
          } else {
            __resumeRestored = true; tryResume();
          }
        } catch (e) { __resumeRestored = true; tryResume(); }
      }).catch(function () { __resumeRestored = true; });
    }

    // Snapshot periodici e sugli eventi di uscita/background.
    setInterval(snapshotNow, 45000);
    document.addEventListener('visibilitychange', function () { if (document.hidden) snapshotNow(); });
    window.addEventListener('pagehide', function(){ try{ snapshotNow(); }catch(e){} });
    window.addEventListener('beforeunload', function(){ try{ snapshotNow(); }catch(e){} });

    // Auto-restore una sola volta appena il core e pronto (dopo il reload = solo un flash).
    var __waited = 0;

      __waited += 700;

      } else if (__waited > 20000) {
        clearInterval(__resumePoll);
      }

    /* ===== PART B: PWA INSTALL BUTTON (iOS-only) ===== */
    function isStandalone() {

    }
    function showInstallOverlay() {
      if (document.getElementById('iosInstallOverlay')) return;

      ov.id = 'iosInstallOverlay';
      ov.setAttribute('style',
        'position:fixed;inset:0;z-index:100000;display:flex;align-items:center;justify-content:center;' +
        'background:rgba(2,6,23,.66);backdrop-filter:blur(4px);padding:18px;');
      var box = document.createElement('div');
      box.setAttribute('style',

        'background:linear-gradient(145deg,#eef2f7,#c7cdd8);box-shadow:0 24px 70px #0009;' +
        'border:1px solid #ffffffaa;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;');
      box.innerHTML =
        '<div style="font-weight:900;letter-spacing:.04em;font-size:16px;margin-bottom:8px;text-align:center;">Installa come app</div>' +
        '<div style="font-size:13px;line-height:1.45;">' +
        '1. Tocca l\'icona <b>Condividi</b> (il quadrato con la freccia verso l\'alto) nella barra di Safari.<br><br>' +
        '2. Scorri e tocca <b>Aggiungi a Home</b> / <b>Add to Home Screen</b>.<br><br>' +
        '3. Conferma con <b>Aggiungi</b>. Apri poi l\'app dalla schermata Home: partira a schermo intero.' +
        '</div>' +
        '<button id="iosInstallClose" style="margin-top:12px;width:100%;border:0;border-radius:14px;padding:11px;' +
        'font-weight:800;color:#fff;background:linear-gradient(145deg,#6b7280,#303746);">Chiudi</button>';
      ov.appendChild(box);
      document.body.appendChild(ov);
      function close() { var el = document.getElementById('iosInstallOverlay'); if (el) el.remove(); }
      ov.addEventListener('click', function (e) { if (e.target === ov) close(); });
      var cb = document.getElementById('iosInstallClose');
      if (cb) cb.addEventListener('click', close);
    }
    function addInstallButton() {
      if (document.getElementById('iosInstallBtn')) return;
      var btn = document.createElement('button');
      btn.id = 'iosInstallBtn';
      btn.className = 'utilBtn';
      btn.textContent = '📲 Installa app (iOS)';
      btn.addEventListener('click', function (ev) {
        ev.preventDefault();
        if (isStandalone()) {
          try { alert('App gia installata / in esecuzione in modalita standalone.'); } catch (e) {}

        showInstallOverlay();

      document.addEventListener('DOMContentLoaded', addInstallButton, { once: true });

    }

    console.warn('IOS AUTO RESUME + PWA INSTALL PATCH skipped:', e);
  }

<script>
/* PWA STANDALONE AB SIMULATEINPUT FIX V2
   Nota tecnica (EmulatorJS issue #978): simulateInput funziona in modo affidabile
   solo se il canvas dell'emulatore ha il focus. In modalita' PWA standalone (WKWebView)
   gli eventi KeyboardEvent sintetici non arrivano al core, quindi qui:
   1) diamo focus al canvas, 2) chiamiamo simulateInput(0, idx, val).
   Non usiamo stopPropagation, cosi' il fallback tastiera resta come backup. */
(function () {
  try {
    var IS_STANDALONE = (window.navigator.standalone === true) ||
      (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches);
    if (!IS_STANDALONE) return;

    var A_IDX = 8, B_IDX = 0;

    function focusCanvas() {
      try {
        var c = document.querySelector('#game canvas');
        if (c && typeof c.focus === 'function') c.focus({ preventScroll: true });
        if (window.EJS_emulator && window.EJS_emulator.canvas &&
            typeof window.EJS_emulator.canvas.focus === 'function') {
          window.EJS_emulator.canvas.focus({ preventScroll: true });
        }
      } catch (e) {}
    }
    function sim(idx, val) {
      try {
        if (window.EJS_emulator && window.EJS_emulator.gameManager &&
            typeof window.EJS_emulator.gameManager.simulateInput === 'function') {
          window.EJS_emulator.gameManager.simulateInput(0, idx, val);
        }
      } catch (e) {}
    }
    function bindBtn(el, idx) {
      if (!el || el.dataset.simv2 === '1') return;
      el.dataset.simv2 = '1';
      function down(ev) {
        if (ev && ev.preventDefault) ev.preventDefault();
        el.classList.add('isDown');
        focusCanvas();
        sim(idx, 1);
      }
      function up(ev) {
        if (ev && ev.preventDefault) ev.preventDefault();
        el.classList.remove('isDown');
        sim(idx, 0);
      }
      el.addEventListener('touchstart', down, { passive: false });
      el.addEventListener('pointerdown', down, { passive: false });
      el.addEventListener('touchend', up, { passive: false });
      el.addEventListener('touchcancel', up, { passive: false });
      el.addEventListener('pointerup', up, { passive: false });
      el.addEventListener('pointerleave', up, { passive: false });
    }
    var waited = 0;
    var poll = setInterval(function () {
      waited += 500;
      var ready = window.EJS_emulator && window.EJS_emulator.gameManager &&
        typeof window.EJS_emulator.gameManager.simulateInput === 'function';
      if (ready) {
        clearInterval(poll);
        bindBtn(document.querySelector('.btnA'), A_IDX);
        bindBtn(document.querySelector('.btnB'), B_IDX);
        focusCanvas();
      } else if (waited > 30000) {
        clearInterval(poll);
      }
    }, 500);
  } catch (e) {
    console.warn('PWA AB simulateInput v2 skipped:', e);
  }
})();
</script>
